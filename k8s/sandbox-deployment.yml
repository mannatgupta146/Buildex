apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-deployment
  labels:
    app: sandbox-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox
  template:
    metadata:
      labels:
        app: sandbox
    spec:
      serviceAccountName: resource-manager
      containers:
        - image: sandbox:latest
          imagePullPolicy: IfNotPresent
          name: main-sandbox-container
          resources:
            limits:
              cpu: "500m"
              memory: "400Mi"
            requests:
              cpu: "250m"
              memory: "200Mi"
          livenessProbe:
            httpGet:
              path: /api/sandbox/health
              port: 3000
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /api/sandbox/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /api/sandbox/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          ports:
            - containerPort: 3000
              name: main-sandbox
