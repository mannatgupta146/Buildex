apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-deployment
  labels:
    name: sandbox-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox
  template:
    metadata:
      labels:
        app: sandbox
    spec:
      serviceAccountName: resource-manager
      containers:
        - image: sandbox:latest
          imagePullPolicy: IfNotPresent
          name: main-sandbox-container
          resources:
            limits:
              cpu: "300m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          startupProbe:
            httpGet:
              path: /api/sandbox/health
              port: 3000
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/sandbox/health
              port: 3000
            initialDelaySeconds: 0
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/sandbox/health
              port: 3000
            initialDelaySeconds: 0
            timeoutSeconds: 10
          env: 
            - name: REDIS_URL
              valueFrom: 
                secretKeyRef:
                  name: database
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt
                  key: JWT_SECRET
            - name: SANDBOX_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: database
                  key: SANDBOX
          ports:
            - containerPort: 3000
              name: main-sandbox
