apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-deployment
  labels:
    name: ai-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-server
  template:
    metadata:
      labels:
        app: ai-server
    spec:
      containers:
        - image: ai-orchestration
          name: ai-server
          resources:
            requests:
              cpu: "250m"
              memory: "128M"
            limits:
              cpu: "500m"
              memory: "256M"
          env:
            - name: MISTRALAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secret
                  key: MISTRALAI_API_KEY
          startupProbe:
            httpGet:
              path: /api/status/healthz
              port: 3000
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/status/healthz
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/status/healthz
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
          ports:
            - containerPort: 3000
              name: ai-server-port
