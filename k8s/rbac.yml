apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: resource-manager
      namespace: default

  - apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: resource-manager
      namespace: default
    rules:
      - apiGroups: [""]
        resources:
          - pods
          - services
        verbs:
          - get
          - list
          - watch
          - create
          - delete

  - apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: resource-manager-binding
      namespace: default
    subjects:
      - kind: ServiceAccount
        name: resource-manager
        namespace: default
    roleRef:
      kind: Role
      name: resource-manager
      apiGroup: rbac.authorization.k8s.io